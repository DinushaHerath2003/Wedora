version: '3.9'

services:
  mysql:
    image: mysql:8
    container_name: wedora_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wedora_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: wedora_backend
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      - mysql
    env_file:
      - backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306

volumes:
  mysql_data:
